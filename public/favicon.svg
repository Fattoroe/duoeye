<svg viewBox="10 11 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient for Owl Body -->
    <linearGradient id="owl-body-grad" x1="32" y1="11" x2="32" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8CE85C" />
      <stop offset="50%" stop-color="#58CC02" />
      <stop offset="100%" stop-color="#3B9E00" />
    </linearGradient>
    
    <!-- Gradient for Beak -->
    <linearGradient id="owl-beak-grad" x1="32" y1="34" x2="32" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFD33D" />
      <stop offset="100%" stop-color="#F3A000" />
    </linearGradient>

    <!-- Shadow for Eyes -->
    <filter id="eye-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1" flood-color="#122431" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Mascot Body Shadow -->
  <ellipse cx="32" cy="51" rx="18" ry="4" fill="#000000" fill-opacity="0.12" />

  <!-- Mascot Body (Inverted U-shape) -->
  <path d="M32 11C43.5 11 50 19 50 29.5V44C50 48.4 46.4 52 42 52H22C17.6 52 14 48.4 14 44V29.5C14 19 20.5 11 32 11Z" fill="url(#owl-body-grad)" stroke="#2F7B00" stroke-width="1.5" />

  <!-- Body Top Highlight (3D bubble effect) -->
  <path d="M20 15C26 12.5 38 12.5 44 15C47 16.2 46 17.5 42 17C36 16.2 28 16.2 22 17C18 17.5 17 16.2 20 15Z" fill="#FFFFFF" fill-opacity="0.45" />

  <!-- Ears/Tufts -->
  <!-- Left Ear -->
  <path d="M21 16.5C17.5 12 14 13.5 14.5 18C15 21.5 18 20.5 21 16.5Z" fill="#8CE85C" stroke="#2F7B00" stroke-width="1" />
  <!-- Right Ear -->
  <path d="M43 16.5C46.5 12 50 13.5 49.5 18C49 21.5 46 20.5 43 16.5Z" fill="#8CE85C" stroke="#2F7B00" stroke-width="1" />

  <!-- Eye Mask (White, merged spectacles shape) -->
  <path filter="url(#eye-shadow)" d="M25.5 23C20.8 23 17 26.8 17 31.5C17 36.2 20.8 40 25.5 40C28.2 40 30.6 38.7 32 36.7C33.4 38.7 35.8 40 38.5 40C43.2 40 47 36.2 47 31.5C47 26.8 43.2 23 38.5 23C35.8 23 33.4 24.3 32 26.3C30.6 24.3 28.2 23 25.5 23Z" fill="#FFFFFF" />

  <!-- Left Pupil -->
  <circle cx="25.5" cy="31.5" r="4.2" fill="#122431" />
  <!-- Left Pupil Sparkle 1 -->
  <circle cx="24.0" cy="29.8" r="1.3" fill="#FFFFFF" />
  <!-- Left Pupil Sparkle 2 (Very small) -->
  <circle cx="27.2" cy="33.0" r="0.6" fill="#FFFFFF" />

  <!-- Right Pupil -->
  <circle cx="38.5" cy="31.5" r="4.2" fill="#122431" />
  <!-- Right Pupil Sparkle 1 -->
  <circle cx="37.0" cy="29.8" r="1.3" fill="#FFFFFF" />
  <!-- Right Pupil Sparkle 2 (Very small) -->
  <circle cx="40.2" cy="33.0" r="0.6" fill="#FFFFFF" />

  <!-- Rosy Cheeks (Blush) -->
  <ellipse cx="18" cy="39" rx="3.5" ry="2.2" fill="#FF5E7E" fill-opacity="0.35" />
  <ellipse cx="46" cy="39" rx="3.5" ry="2.2" fill="#FF5E7E" fill-opacity="0.35" />

  <!-- Cute Rounded Beak -->
  <path d="M32 34C34.5 34 36.5 36.5 35.5 39.5C34.8 41.8 33.2 43.5 32 43.5C30.8 43.5 29.2 41.8 28.5 39.5C27.5 36.5 29.5 34 32 34Z" fill="url(#owl-beak-grad)" />
  <!-- Beak Highlight -->
  <path d="M30.5 36C31 35.2 33 35.2 33.5 36" stroke="#FFFFFF" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.6" />

  <!-- Chest Belly Feathers (Cute double smile shape) -->
  <path d="M23 45.5C25.5 47.2 28 48 30.5 48C33 48 35.5 47.2 38 45.5" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="2.5" stroke-linecap="round" fill="none" />
  <path d="M26 42.5C28 43.8 30 44.5 32 44.5C34 44.5 36 43.8 38 42.5" stroke="#FFFFFF" stroke-opacity="0.45" stroke-width="2" stroke-linecap="round" fill="none" />
</svg>
